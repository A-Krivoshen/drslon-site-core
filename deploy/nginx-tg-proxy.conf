# Deploy to: /etc/nginx/sites-available/tg.krivoshein.site
# Symlink: ln -s /etc/nginx/sites-available/tg.krivoshein.site /etc/nginx/sites-enabled/
# SSL: certbot certonly --webroot -w /var/www/letsencrypt -d tg.krivoshein.site

server {
	listen 80;
	server_name tg.krivoshein.site;

	location /.well-known/acme-challenge/ {
		root /var/www/letsencrypt;
	}

	location / {
		return 301 https://$host$request_uri;
	}
}

server {
	listen 443 ssl http2;
	server_name tg.krivoshein.site;

	ssl_certificate     /etc/letsencrypt/live/tg.krivoshein.site/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/tg.krivoshein.site/privkey.pem;

	more_clear_headers 'X-Frame-Options';

	proxy_cache off;
	proxy_ssl_server_name on;
	proxy_set_header Accept-Encoding "";
	proxy_cookie_domain t.me tg.krivoshein.site;
	proxy_cookie_path / /;

	location = /js/telegram-widget.js {
		proxy_pass https://telegram.org/js/telegram-widget.js;
		proxy_set_header Host telegram.org;
	}

	location ^~ /js/ {
		proxy_pass https://telegram.org/js/;
		proxy_set_header Host telegram.org;
		sub_filter_once off;
		sub_filter_types application/javascript text/javascript;
		sub_filter '//telegram.org/' 'https://tg.krivoshein.site/';
		sub_filter 'https://telegram.org/' 'https://tg.krivoshein.site/';
		sub_filter 'https://oauth.tg.dev/' 'https://tg.krivoshein.site/oauth/';
	}

	location ^~ /css/ {
		proxy_pass https://telegram.org/css/;
		proxy_set_header Host telegram.org;
	}

	location ^~ /img/ {
		proxy_pass https://telegram.org/img/;
		proxy_set_header Host telegram.org;
	}

	location ^~ /oauth/ {
		proxy_pass https://oauth.telegram.org/;
		proxy_set_header Host oauth.telegram.org;
	}

	location ^~ /api/ {
		proxy_pass https://t.me/api/;
		proxy_set_header Host t.me;
		proxy_set_header Cookie $http_cookie;
	}

	location ^~ /drslon_channel {
		proxy_pass https://t.me/drslon_channel;
		proxy_set_header Host t.me;
		proxy_set_header Cookie $http_cookie;
		proxy_hide_header X-Frame-Options;
		proxy_hide_header Content-Security-Policy;
		more_clear_headers 'X-Frame-Options';
		add_header Content-Security-Policy "frame-ancestors https://krivoshein.site https://www.krivoshein.site" always;
		sub_filter_once off;
		sub_filter_types text/html;
		sub_filter '//telegram.org/' 'https://tg.krivoshein.site/';
		sub_filter 'https://telegram.org/' 'https://tg.krivoshein.site/';
		sub_filter 'https://t.me/api/' 'https://tg.krivoshein.site/api/';
		sub_filter 'https:\/\/t.me\/api\/' 'https:\/\/tg.krivoshein.site\/api\/';
		sub_filter 'https://oauth.tg.dev/' 'https://tg.krivoshein.site/oauth/';
		sub_filter '<script src="https://tg.krivoshein.site/oauth/js/telegram-widget.js?23"></script>' '';
	}
}