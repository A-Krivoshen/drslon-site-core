# Install as /etc/nginx/sites-available/tg.krivoshein.site and enable it.
# The media route is intentionally limited to Telegram's numbered CDN hosts.

server {
	listen 80;
	server_name tg.krivoshein.site;

	location /.well-known/acme-challenge/ {
		root /var/www/letsencrypt;
	}

	location / {
		return 301 https://$host$request_uri;
	}
}

server {
	listen 443 ssl;
	http2 on;
	server_name tg.krivoshein.site;

	access_log /var/log/nginx/tg.krivoshein.site.access.log;
	error_log  /var/log/nginx/tg.krivoshein.site.error.log;

	ssl_certificate     /etc/letsencrypt/live/tg.krivoshein.site/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/tg.krivoshein.site/privkey.pem;
	include /etc/letsencrypt/options-ssl-nginx.conf;
	ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

	# WordOps sets X-Frame-Options: SAMEORIGIN globally; must clear for cross-site iframe embed.
	more_clear_headers 'X-Frame-Options';

	proxy_cache off;
	proxy_buffering on;
	proxy_http_version 1.1;
	proxy_ssl_server_name on;
	proxy_ssl_verify on;
	proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
	proxy_set_header Accept-Encoding "";
	proxy_hide_header Set-Cookie;
	resolver 1.1.1.1 8.8.8.8 ipv6=off valid=300s;
	set $telegram_host telegram.org;
	set $oauth_host oauth.telegram.org;
	set $tme_host t.me;

	location = /js/telegram-widget.js {
		proxy_pass https://$telegram_host$request_uri;
		proxy_ssl_name $telegram_host;
		proxy_set_header Host telegram.org;
		proxy_set_header Accept-Encoding "";
		proxy_set_header Cookie "";
		add_header Cache-Control "public, max-age=3600" always;
		add_header X-KRV-TG-Proxy "widget-js" always;
	}

	location ^~ /js/ {
		proxy_pass https://$telegram_host$request_uri;
		proxy_ssl_name $telegram_host;
		proxy_set_header Host telegram.org;
		proxy_set_header Accept-Encoding "";
		proxy_set_header Cookie "";
		sub_filter_once off;
		sub_filter_types application/javascript text/javascript;
		sub_filter '//telegram.org/' 'https://tg.krivoshein.site/';
		sub_filter 'https://telegram.org/' 'https://tg.krivoshein.site/';
		sub_filter 'https://oauth.tg.dev/' 'https://tg.krivoshein.site/oauth/';
		add_header X-KRV-TG-Proxy "telegram-js" always;
	}

	location ^~ /css/ {
		proxy_pass https://$telegram_host$request_uri;
		proxy_ssl_name $telegram_host;
		proxy_set_header Host telegram.org;
		proxy_set_header Accept-Encoding "";
		proxy_set_header Cookie "";
		add_header Cache-Control "public, max-age=86400" always;
		add_header X-KRV-TG-Proxy "telegram-css" always;
	}

	location ^~ /img/ {
		proxy_pass https://$telegram_host$request_uri;
		proxy_ssl_name $telegram_host;
		proxy_set_header Host telegram.org;
		proxy_set_header Accept-Encoding "";
		proxy_set_header Cookie "";
		add_header Cache-Control "public, max-age=86400" always;
		add_header X-KRV-TG-Proxy "telegram-img" always;
	}

	location ^~ /fonts/ {
		proxy_pass https://$telegram_host$request_uri;
		proxy_ssl_name $telegram_host;
		proxy_set_header Host telegram.org;
		proxy_set_header Accept-Encoding "";
		proxy_set_header Cookie "";
		add_header Cache-Control "public, max-age=604800, immutable" always;
		add_header X-KRV-TG-Proxy "telegram-font" always;
	}

	location ^~ /oauth/ {
		rewrite ^/oauth/(.*)$ /$1 break;
		proxy_pass https://$oauth_host$uri$is_args$args;
		proxy_ssl_name $oauth_host;
		proxy_set_header Host oauth.telegram.org;
		proxy_set_header Accept-Encoding "";
		proxy_set_header Cookie "";
		sub_filter_once off;
		sub_filter_types application/javascript;
		sub_filter '//telegram.org/' 'https://tg.krivoshein.site/';
		sub_filter 'https://telegram.org/' 'https://tg.krivoshein.site/';
		sub_filter 'https://oauth.telegram.org/' 'https://tg.krivoshein.site/oauth/';
		add_header X-KRV-TG-Proxy "telegram-oauth" always;
	}

	location ^~ /auth {
		proxy_pass https://$tme_host$request_uri;
		proxy_ssl_name $tme_host;
		proxy_set_header Host t.me;
		proxy_set_header Accept-Encoding "";
		proxy_set_header Cookie "";
		add_header Cache-Control "no-store" always;
		add_header X-KRV-TG-Proxy "telegram-auth" always;
	}

	location ^~ /api/ {
		proxy_pass https://$tme_host$request_uri;
		proxy_ssl_name $tme_host;
		proxy_set_header Host t.me;
		proxy_set_header Accept-Encoding "";
		proxy_set_header Cookie "";
		sub_filter_once off;
		sub_filter_types application/json;
		sub_filter 'https://cdn1.telesco.pe/file/' 'https://tg.krivoshein.site/media/cdn1/';
		sub_filter 'https://cdn2.telesco.pe/file/' 'https://tg.krivoshein.site/media/cdn2/';
		sub_filter 'https://cdn3.telesco.pe/file/' 'https://tg.krivoshein.site/media/cdn3/';
		sub_filter 'https://cdn4.telesco.pe/file/' 'https://tg.krivoshein.site/media/cdn4/';
		sub_filter 'https://cdn5.telesco.pe/file/' 'https://tg.krivoshein.site/media/cdn5/';
		sub_filter 'https:\/\/cdn1.telesco.pe\/file\/' 'https:\/\/tg.krivoshein.site\/media\/cdn1\/';
		sub_filter 'https:\/\/cdn2.telesco.pe\/file\/' 'https:\/\/tg.krivoshein.site\/media\/cdn2\/';
		sub_filter 'https:\/\/cdn3.telesco.pe\/file\/' 'https:\/\/tg.krivoshein.site\/media\/cdn3\/';
		sub_filter 'https:\/\/cdn4.telesco.pe\/file\/' 'https:\/\/tg.krivoshein.site\/media\/cdn4\/';
		sub_filter 'https:\/\/cdn5.telesco.pe\/file\/' 'https:\/\/tg.krivoshein.site\/media\/cdn5\/';
		add_header Cache-Control "no-store" always;
		add_header X-KRV-TG-Proxy "telegram-api" always;
	}

	location ^~ /drslon_channel {
		proxy_pass https://$tme_host$request_uri;
		proxy_ssl_name $tme_host;
		proxy_set_header Host t.me;
		proxy_set_header Accept-Encoding "";
		proxy_set_header Cookie "";
		proxy_hide_header Set-Cookie;
		proxy_hide_header X-Frame-Options;
		proxy_hide_header Content-Security-Policy;
		more_clear_headers 'X-Frame-Options';
		add_header Content-Security-Policy "frame-ancestors https://krivoshein.site https://www.krivoshein.site" always;
		sub_filter_once off;
		sub_filter '//telegram.org/' 'https://tg.krivoshein.site/';
		sub_filter 'https://telegram.org/' 'https://tg.krivoshein.site/';
		sub_filter 'https://t.me/api/' 'https://tg.krivoshein.site/api/';
		sub_filter 'https:\/\/t.me\/api\/' 'https:\/\/tg.krivoshein.site\/api\/';
		sub_filter 'https://oauth.tg.dev/' 'https://tg.krivoshein.site/oauth/';
		sub_filter '<script src="https://tg.krivoshein.site/oauth/js/telegram-widget.js?23"></script>' '';
		sub_filter 'https://cdn1.telesco.pe/file/' 'https://tg.krivoshein.site/media/cdn1/';
		sub_filter 'https://cdn2.telesco.pe/file/' 'https://tg.krivoshein.site/media/cdn2/';
		sub_filter 'https://cdn3.telesco.pe/file/' 'https://tg.krivoshein.site/media/cdn3/';
		sub_filter 'https://cdn4.telesco.pe/file/' 'https://tg.krivoshein.site/media/cdn4/';
		sub_filter 'https://cdn5.telesco.pe/file/' 'https://tg.krivoshein.site/media/cdn5/';
		sub_filter '</head>' '<style id="krv-hide-tg-login">.tgme_post_discussion_login,.tgme_post_discussion_login_btn,.js-login_btn{display:none!important;height:0!important;margin:0!important;padding:0!important;overflow:hidden!important;visibility:hidden!important;pointer-events:none!important}</style></head>';
		add_header Cache-Control "no-store" always;
		add_header X-KRV-TG-Proxy "telegram-embed" always;
	}

	# Restrict media proxying to Telegram's numbered telesco.pe CDN hosts.
	location ~ ^/media/cdn([1-5])/(.+)$ {
		set $tg_media_host "cdn$1.telesco.pe";
		set $tg_media_path $2;

		proxy_pass https://$tg_media_host/file/$tg_media_path$is_args$args;
		proxy_ssl_name $tg_media_host;
		proxy_set_header Host $tg_media_host;
		proxy_set_header Cookie "";
		proxy_set_header Range $http_range;
		proxy_set_header If-Range $http_if_range;
		proxy_hide_header Set-Cookie;
		proxy_hide_header Content-Disposition;

		limit_except GET HEAD {
			deny all;
		}

		add_header Cache-Control "public, max-age=604800, immutable" always;
		add_header X-Content-Type-Options "nosniff" always;
		add_header X-KRV-TG-Proxy "telegram-media" always;
	}

	location = / {
		return 200 'Telegram comments proxy for krivoshein.site';
		add_header Content-Type text/plain;
	}
}
